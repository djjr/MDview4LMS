<!DOCTYPE html>
<!-- MDview4LMS v0.1 — Video + Stop & Think Viewer -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <div id="video-container">
      <div id="player-wrapper">
        <div id="player"></div>
      </div>
    </div>

    <div id="divider" title="Drag to resize"></div>

    <div id="sidebar">
      <div id="sidebar-header">
        <span class="sidebar-label">Stop &amp; Think</span>
        <span id="time-indicator">—</span>
      </div>
      <iframe id="question-iframe" src="about:blank" title="Stop and Think questions" loading="lazy"></iframe>
      <div id="sidebar-empty">
        <p>Questions will appear here as the video plays.</p>
      </div>
    </div>

  </div>
  <!-- YouTube IFrame API loads async and calls window.onYouTubeIframeAPIReady when ready -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
